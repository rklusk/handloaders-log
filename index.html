<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handloader's Log</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f4f0;
  --bg-tertiary: #eeece6;
  --text-primary: #1a1a18;
  --text-secondary: #6b6a65;
  --text-tertiary: #9e9d98;
  --border-light: rgba(0,0,0,0.08);
  --border-mid: rgba(0,0,0,0.14);
  --border-strong: rgba(0,0,0,0.22);
  --amber: #b8720a;
  --amber-light: #fdf0d8;
  --amber-mid: #e8940f;
  --teal: #0f6e56;
  --teal-light: #e1f5ee;
  --blue: #185fa5;
  --blue-light: #e6f1fb;
  --coral: #993c1d;
  --coral-light: #faece7;
  --gray-light: #f1efe8;
  --red: #a32d2d;
  --red-light: #fcebeb;
  --green: #3b6d11;
  --green-light: #eaf3de;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.07);
  --shadow-modal: 0 8px 40px rgba(0,0,0,0.18), 0 0 0 0.5px rgba(0,0,0,0.1);
  --font: 'Georgia', serif;
  --font-ui: system-ui, -apple-system, sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1e1d1a;
    --bg-secondary: #252420;
    --bg-tertiary: #2c2b27;
    --text-primary: #f0ede6;
    --text-secondary: #9a9890;
    --text-tertiary: #6a6860;
    --border-light: rgba(255,255,255,0.07);
    --border-mid: rgba(255,255,255,0.12);
    --border-strong: rgba(255,255,255,0.2);
    --amber: #e8940f;
    --amber-light: #2d2210;
    --amber-mid: #d4820c;
    --teal-light: #0d2e23;
    --teal: #1d9e75;
    --blue-light: #0a1e35;
    --blue: #4a9de0;
    --coral-light: #2d1208;
    --coral: #e06040;
    --gray-light: #252420;
    --red-light: #2d0f0f;
    --red: #e05555;
    --green-light: #111f06;
    --green: #70b030;
    --shadow: 0 1px 4px rgba(0,0,0,0.3), 0 0 0 0.5px rgba(255,255,255,0.05);
    --shadow-modal: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(255,255,255,0.08);
  }
}

html, body { height: 100%; }
body { font-family: var(--font-ui); background: var(--bg-tertiary); color: var(--text-primary); font-size: 14px; line-height: 1.5; }

.shell { display: flex; flex-direction: column; height: 100vh; max-width: 960px; margin: 0 auto; background: var(--bg-primary); box-shadow: 0 0 0 0.5px var(--border-light); }

/* Topbar */
.topbar { display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-bottom: 0.5px solid var(--border-light); background: var(--bg-primary); flex-shrink: 0; }
.app-logo { width: 28px; height: 28px; background: var(--amber); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: 700; font-family: var(--font); }
.app-name { font-family: var(--font); font-size: 15px; font-weight: bold; color: var(--text-primary); letter-spacing: -0.01em; }
.app-name span { color: var(--amber); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.save-indicator { font-size: 11px; color: var(--teal); opacity: 0; transition: opacity 0.3s; }
.save-indicator.show { opacity: 1; }
.export-btn { font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-mid); background: none; color: var(--text-secondary); cursor: pointer; transition: background 0.15s; }
.export-btn:hover { background: var(--bg-secondary); }

/* Tabs */
.tabbar { display: flex; border-bottom: 0.5px solid var(--border-light); background: var(--bg-primary); padding: 0 16px; flex-shrink: 0; overflow-x: auto; }
.tab { padding: 10px 16px; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; border: none; background: none; color: var(--text-tertiary); border-bottom: 2px solid transparent; margin-bottom: -0.5px; white-space: nowrap; transition: color 0.15s; }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--amber); border-bottom-color: var(--amber); }

.content { flex: 1; overflow-y: auto; padding: 20px; }

/* Section header */
.sec-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sec-title { font-family: var(--font); font-size: 17px; font-weight: bold; color: var(--text-primary); }
.sec-count { font-size: 12px; color: var(--text-tertiary); font-family: var(--font-ui); font-weight: 400; margin-left: 6px; }

/* Cards */
.card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; box-shadow: var(--shadow); }
.card:hover { border-color: var(--border-mid); box-shadow: 0 2px 8px rgba(0,0,0,0.1), 0 0 0 0.5px rgba(0,0,0,0.08); }
.card-hdr { display: flex; justify-content: space-between; align-items: flex-start; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.card-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
.card-meta span { font-size: 11px; color: var(--text-tertiary); }
.card-note { font-size: 11px; color: var(--text-secondary); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border-light); line-height: 1.5; }

/* Badges */
.badge { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.b-amber { background: var(--amber-light); color: var(--amber); }
.b-teal { background: var(--teal-light); color: var(--teal); }
.b-blue { background: var(--blue-light); color: var(--blue); }
.b-gray { background: var(--gray-light); color: var(--text-secondary); }
.b-green { background: var(--green-light); color: var(--green); }
.b-coral { background: var(--coral-light); color: var(--coral); }

/* Search */
.search { width: 100%; padding: 9px 14px; font-size: 13px; border: 0.5px solid var(--border-mid); border-radius: var(--radius-sm); background: var(--bg-secondary); color: var(--text-primary); margin-bottom: 14px; outline: none; transition: border-color 0.15s; }
.search:focus { border-color: var(--amber); }
.search::placeholder { color: var(--text-tertiary); }

/* Stat grid */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; margin-bottom: 16px; }
.stat-card { background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 10px 12px; }
.stat-lbl { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.stat-val { font-size: 22px; font-weight: 700; color: var(--text-primary); font-family: var(--font); }
.stat-unit { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-ui); font-weight: 400; margin-left: 2px; }

/* Buttons */
.btn { font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; letter-spacing: 0.02em; }
.btn:active { transform: scale(0.97); }
.btn-amber { background: var(--amber); color: white; }
.btn-amber:hover { opacity: 0.88; }
.btn-ghost { background: none; border: 0.5px solid var(--border-mid); color: var(--text-secondary); font-weight: 500; }
.btn-ghost:hover { background: var(--bg-secondary); color: var(--text-primary); }
.btn-danger { background: none; border: 0.5px solid var(--red); color: var(--red); font-weight: 500; }
.btn-danger:hover { background: var(--red-light); }
.btn-xs { font-size: 11px; padding: 4px 10px; }
.back-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-tertiary); cursor: pointer; background: none; border: none; padding: 0 0 14px 0; transition: color 0.15s; }
.back-btn:hover { color: var(--amber); }

/* Detail panel */
.detail-panel { background: var(--bg-secondary); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.detail-section-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 10px; margin-top: 14px; padding-top: 12px; border-top: 0.5px solid var(--border-light); }
.detail-section-lbl:first-child { margin-top: 0; padding-top: 0; border-top: none; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.field-full { grid-column: 1 / -1; }
.field-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 3px; }
.field-val { font-size: 13px; color: var(--text-primary); }
.divider { height: 0.5px; background: var(--border-light); margin: 12px 0; }

.notes-box { background: var(--amber-light); border: 0.5px solid rgba(184,114,10,0.2); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 14px; }
.notes-box p { font-size: 13px; color: var(--text-primary); line-height: 1.6; }

/* Inventory rows */
.inv-card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius); margin-bottom: 14px; box-shadow: var(--shadow); }
.inv-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 0.5px solid var(--border-light); gap: 10px; }
.inv-row:last-child { border-bottom: none; }
.inv-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.inv-note { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.inv-unit { font-size: 11px; color: var(--text-tertiary); }

/* Qty stepper */
.qty-stepper { display: flex; align-items: center; gap: 4px; }
.qty-btn { width: 26px; height: 26px; border-radius: 5px; border: 0.5px solid var(--border-mid); background: var(--bg-secondary); color: var(--text-primary); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; transition: background 0.12s, border-color 0.12s; flex-shrink: 0; }
.qty-btn:hover { background: var(--bg-tertiary); border-color: var(--border-strong); }
.qty-btn:active { transform: scale(0.93); }
.qty-input { width: 58px; text-align: center; padding: 4px 6px; font-size: 14px; font-weight: 700; font-family: var(--font); border: 0.5px solid var(--border-mid); border-radius: 5px; background: var(--bg-secondary); color: var(--text-primary); outline: none; transition: border-color 0.15s; -moz-appearance: textfield; }
.qty-input:focus { border-color: var(--amber); background: var(--bg-primary); }
.qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.qty-unit-lbl { font-size: 11px; color: var(--text-tertiary); min-width: 18px; }

/* Modal */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; z-index: 1000; backdrop-filter: blur(2px); }
.modal { background: var(--bg-primary); border-radius: var(--radius); border: 0.5px solid var(--border-mid); box-shadow: var(--shadow-modal); padding: 22px; width: 620px; max-width: calc(100vw - 32px); max-height: calc(100vh - 80px); overflow-y: auto; }
.modal-title { font-family: var(--font); font-size: 16px; font-weight: bold; margin-bottom: 18px; color: var(--text-primary); }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; padding-top: 16px; border-top: 0.5px solid var(--border-light); }

/* Forms */
.form-group { margin-bottom: 12px; }
.form-lbl { display: block; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 5px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 8px 12px; font-size: 13px; border: 0.5px solid var(--border-mid); border-radius: var(--radius-sm); background: var(--bg-secondary); color: var(--text-primary); font-family: var(--font-ui); outline: none; transition: border-color 0.15s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--amber); }
.form-textarea { min-height: 72px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.form-row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
.form-section-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin: 16px 0 10px; padding-top: 14px; border-top: 0.5px solid var(--border-light); }

/* Empty state */
.empty { text-align: center; padding: 50px 20px; color: var(--text-tertiary); font-size: 13px; }
.empty-icon { font-size: 36px; margin-bottom: 12px; display: block; opacity: 0.5; }

/* Conditional section for sights */
#optic-detail-group { display: none; }
#optic-detail-group.show { display: block; }
#handgun-mags-group { }

/* Google Drive sync */
.gdrive-btn { font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--teal); background: none; color: var(--teal); cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.gdrive-btn:hover { background: var(--teal-light); }
.gdrive-btn.signed-in { border-color: var(--green); color: var(--green); }
.gdrive-btn.signed-in:hover { background: var(--green-light); }
.gdrive-status { font-size: 10px; color: var(--text-tertiary); max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="app-logo">H</div>
    <div class="app-name">Handloader's <span>Log</span></div>
    <div class="topbar-right">
      <span class="save-indicator" id="save-indicator">✓ Saved</span>
      <span class="gdrive-status" id="gdrive-status"></span>
      <button class="gdrive-btn" id="gdrive-btn" onclick="gdriveAuth()">☁ Connect Drive</button>
      <button class="export-btn" onclick="exportData()">Export JSON</button>
      <button class="export-btn" onclick="importData()">Import JSON</button>
    </div>
  </div>
  <div class="tabbar" id="tabbar">
    <button class="tab active" onclick="switchTab('rifles')">Firearms</button>
    <button class="tab" onclick="switchTab('loads')">Load Recipes</button>
    <button class="tab" onclick="switchTab('inventory')">Components</button>
    <button class="tab" onclick="switchTab('sessions')">Range Sessions</button>
  </div>
  <div class="content" id="content"></div>
</div>
<div id="overlay-root"></div>

<script>
const STORAGE_KEY = 'handloaders-log-v2';

let DB = {
  loads: [], rifles: [], sessions: [],
  inventory: { powder: [], primers: [], brass: [], bullets: [] }
};
let activeTab = 'rifles';
let detailView = null;
let _loadSearch = '';

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
    const el = document.getElementById('save-indicator');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  } catch(e) { console.error('Save failed', e); }
}

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      Object.assign(DB, d);
      if (!DB.sessions) DB.sessions = [];
      if (!DB.inventory) DB.inventory = { powder:[], primers:[], brass:[], bullets:[] };
    } else { seedData(); }
  } catch(e) { seedData(); }
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'handloaders-log-backup.json'; a.click();
}

function importData() {
  const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try { const d = JSON.parse(ev.target.result); Object.assign(DB, d); save(); detailView = null; render(); alert('Imported successfully.'); }
      catch(err) { alert('Invalid JSON file.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function seedData() {
  DB.rifles = [
    { id: uid(), make: 'Fierce', model: 'Carbon Rage', type: 'Bolt Rifle', caliber: '7 PRC', serial: '', caRegistered: 'No',
      sightType: 'Optic', opticType: 'Variable Power Scope', opticDetail: 'Custom turret in development',
      barrel: '22"', twist: '1:8"', weight: '9.5 lbs w/ optic', sighted: 'Yes', sightedRange: '200 yd', sightedDate: '2024-08-15',
      purpose: 'Med-Large Game', magazines: '', holster: 'N/A',
      valueFirearm: '3800', valueOptic: '1200', notes: 'Primary precision hunting rifle.' },
    { id: uid(), make: 'HK', model: 'USP 45', type: 'Handgun', caliber: '.45 ACP', serial: '', caRegistered: 'Yes',
      sightType: 'Iron', opticType: '', opticDetail: '',
      barrel: '4.41"', twist: '1:16"', weight: '1.9 lbs', sighted: 'Yes', sightedRange: '25 yd', sightedDate: '2023-05-10',
      purpose: 'CCW', magazines: '3 × 12rd USP factory', holster: 'Yes — Safariland 6378',
      valueFirearm: '1100', valueOptic: '', notes: '.45 Super compatibility under evaluation. Spring/buffer upgrade required.' },
    { id: uid(), make: 'S&W', model: 'M&P22 Magnum', type: 'Handgun', caliber: '.22 WMR', serial: '', caRegistered: 'Yes',
      sightType: 'Optic', opticType: 'Red Dot / Reflex', opticDetail: 'Holosun HS507k',
      barrel: '4.35"', twist: '1:16"', weight: '1.6 lbs w/ optic', sighted: 'Yes', sightedRange: '25 yd', sightedDate: '2024-01-20',
      purpose: 'CCW', magazines: '2 × 22rd factory', holster: 'Yes — Alien Gear',
      valueFirearm: '650', valueOptic: '320', notes: 'JHP cycles reliably. Avoid TMJ flat-tip, copper-plated, polymer-coated, foreign brass.' },
  ];
  const r0 = DB.rifles[0].id;
  DB.loads = [
    { id: uid(), rifleId: r0, cartridge: '7 PRC',
      diesMake: 'Redding', diesModel: 'Type-S Match Bushing', diesPlatform: 'Turret Press',
      bulletBrand: 'Barnes', bulletModel: 'LRX BT', bulletDiameter: '.284"', bulletWeight: '160', bulletBC: 'G1: .527', bulletSD: '.283', bulletConstruction: 'Bonded / Lead-Free',
      primerBrand: 'Federal', primerSize: 'Large Rifle Magnum', primerModel: '215M',
      powderName: 'Vihtavuori N568', chargeMin: '64.0', chargeMax: '68.0', chargeBest: '67.0',
      mv: '3149', me: '3524', coalMax: '3.390"', coalActual: '3.325"',
      status: 'Active', notes: '~1.5 MOA — seating depth sensitivity under investigation.', created: new Date().toISOString() },
    { id: uid(), rifleId: r0, cartridge: '7 PRC',
      diesMake: 'Redding', diesModel: 'Type-S Match Bushing', diesPlatform: 'Turret Press',
      bulletBrand: 'Hornady', bulletModel: 'ELD-X', bulletDiameter: '.284"', bulletWeight: '175', bulletBC: 'G1: .672', bulletSD: '.310', bulletConstruction: 'Polymer Tip / Bonded',
      primerBrand: 'Federal', primerSize: 'Large Rifle Magnum', primerModel: '215M',
      powderName: 'H4350', chargeMin: '61.0', chargeMax: '65.0', chargeBest: '63.5',
      mv: '2930', me: '3334', coalMax: '3.340"', coalActual: '3.310"',
      status: 'Reference', notes: '~0.5 MOA accuracy benchmark. Reference for turret development.', created: new Date().toISOString() },
  ];
  DB.sessions = [];
  DB.inventory = {
    powder: [
      { id: uid(), name: 'H4350', qty: '3', unit: 'lb', notes: 'Lot #L233' },
      { id: uid(), name: 'Vihtavuori N568', qty: '1', unit: 'lb', notes: 'Cold-weather preferred over N570 for Prudhoe Bay' },
    ],
    primers: [
      { id: uid(), brand: 'Federal', model: '215M', size: 'Large Rifle Magnum', qty: '500', notes: '' },
      { id: uid(), brand: 'CCI', model: '250', size: 'Large Rifle Magnum', qty: '300', notes: '' },
    ],
    brass: [
      { id: uid(), brand: 'Hornady', caliber: '7 PRC', qty: '120', notes: 'Fired 2×' },
      { id: uid(), brand: 'Hornady', caliber: '.300 Win Mag', qty: '80', notes: '' },
    ],
    bullets: [
      { id: uid(), brand: 'Barnes', caliber: '7mm / .284"', cartridge: '7 PRC', weight: '160gr', application: 'Med-Large Game', qty: '200', notes: 'LRX BT' },
      { id: uid(), brand: 'Hornady', caliber: '7mm / .284"', cartridge: '7 PRC', weight: '175gr', application: 'Med-Large Game', qty: '100', notes: 'ELD-X — accuracy reference' },
    ]
  };
  save();
}

// ─── Routing ──────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab; detailView = null; _loadSearch = '';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const order = ['rifles','loads','inventory','sessions'];
  document.querySelectorAll('.tab')[order.indexOf(tab)].classList.add('active');
  render();
}

function render() {
  const c = document.getElementById('content');
  if (activeTab === 'loads') c.innerHTML = detailView?.type === 'load' ? renderLoadDetail(detailView.id) : renderLoads();
  else if (activeTab === 'rifles') c.innerHTML = detailView?.type === 'rifle' ? renderRifleDetail(detailView.id) : renderRifles();
  else if (activeTab === 'sessions') c.innerHTML = renderSessions();
  else if (activeTab === 'inventory') c.innerHTML = renderInventory();
}

function viewLoad(id) { detailView = { type: 'load', id }; render(); }
function viewRifle(id) { detailView = { type: 'rifle', id }; render(); }
function backToList() { detailView = null; render(); }

function getRifle(id) { return DB.rifles.find(r => r.id === id) || null; }
function getLoad(id) { return DB.loads.find(l => l.id === id) || null; }

function statusBadge(s) {
  const map = { Active: 'b-green', Reference: 'b-blue', Testing: 'b-amber', Retired: 'b-gray' };
  return `<span class="badge ${map[s]||'b-gray'}">${s||'—'}</span>`;
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fv(label, val, full) {
  if (!val) return '';
  return `<div${full?' class="field-full"':''}><div class="field-lbl">${label}</div><div class="field-val">${esc(val)}</div></div>`;
}

function renderLoads() {

    if (!_loadSearch) return true;
    const q = _loadSearch.toLowerCase();
    return [l.bulletBrand, l.bulletModel, l.cartridge, l.powderName, l.diesMake].some(f => (f||'').toLowerCase().includes(q));

  return `

// Shared stepper HTML builder
function qtyStepperHTML(cat, id, qty, unit) {
  return `<div class="qty-stepper">
    <button class="qty-btn" onclick="adjustQty('${cat}','${id}',-1,event)" title="Use one">−</button>
    <input class="qty-input" type="number" value="${esc(String(qty))}"
      onchange="setQty('${cat}','${id}',this.value)"
      onblur="setQty('${cat}','${id}',this.value)"
      onclick="this.select()"
      min="0" step="${cat==='powder'?'0.5':'1'}">
    <span class="qty-unit-lbl">${esc(unit)}</span>
    <button class="qty-btn" onclick="adjustQty('${cat}','${id}',1,event)" title="Add one">+</button>
  </div>`;
}

function adjustQty(cat, id, delta, event) {
  event.stopPropagation();
  const item = DB.inventory[cat].find(x => x.id === id);
  if (!item) return;
  const step = cat === 'powder' ? 0.5 : 1;
  const current = parseFloat(item.qty) || 0;
  const next = Math.max(0, +(current + delta * step).toFixed(4));
  item.qty = String(next);
  save();
  // Update input value in-place without full re-render
  const input = event.target.closest('.inv-row')?.querySelector('.qty-input');
  if (input) input.value = next;
}

function setQty(cat, id, val) {
  const item = DB.inventory[cat].find(x => x.id === id);
  if (!item) return;
  const parsed = parseFloat(val);
  item.qty = isNaN(parsed) ? '0' : String(Math.max(0, parsed));
  save();
}

function loadFormHTML(l, prefillRifleId) {
  const rifleOpts = DB.rifles.map(r =>
    `<option value="${r.id}" ${(l?.rifleId||prefillRifleId)===r.id?'selected':''}>${esc(r.make)} ${esc(r.model)} (${esc(r.caliber)})</option>`
  ).join('');

function saveLoad(id) {
  const g = x => (document.getElementById(x)||{}).value||'';
  const data = {
    cartridge: g('f-cart'), rifleId: g('f-rifle'),
    diesMake: g('f-diesmake'), diesModel: g('f-diesmodel'), diesPlatform: g('f-diesplatform'),

    coalMax: g('f-coalmax'), coalActual: g('f-coalactual'),

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async onload="gdriveInit()"></script>
<script>
// ─── Google Drive Sync ────────────────────────────────────────────
const GDRIVE_CLIENT_ID = '789014167759-o2h1jtij676af96uvn1ee8pi7096bqt9.apps.googleusercontent.com';
const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/userinfo.email';
const GDRIVE_FILENAME = 'handloaders-log-data.json';

let gAccessToken = null;
let gDriveFileId = null;
let gUserEmail = '';
let gTokenClient = null;
let gInitDone = false;

function gdriveInit() {
  if (gInitDone) return;
  gInitDone = true;

  // Restore saved session
  try {
    const saved = localStorage.getItem('gdrive-session');
    if (saved) {
      const t = JSON.parse(saved);
      if (t.expiry > Date.now()) {
        gAccessToken = t.token;
        gUserEmail = t.email || '';
        updateDriveUI(true);
        gdriveLoad(true); // silent auto-load on startup
        return;
      } else {
        localStorage.removeItem('gdrive-session');
      }
    }
  } catch(e) {}
  updateDriveUI(false);
}

function gdriveAuth() {
  if (gAccessToken) { openDriveMenu(); return; }

  if (!window.google?.accounts?.oauth2) {
    alert('Google Sign-In is still loading — please try again in a moment.');
    return;
  }

  gTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GDRIVE_CLIENT_ID,
    scope: GDRIVE_SCOPE,
    callback: async (resp) => {
      if (resp.error) { alert('Google sign-in failed: ' + resp.error); return; }
      gAccessToken = resp.access_token;
      const expiry = Date.now() + ((resp.expires_in || 3600) - 60) * 1000;

      // Get user email
      try {
        const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
          headers: { Authorization: 'Bearer ' + gAccessToken }
        });
        const info = await r.json();
        gUserEmail = info.email || '';
      } catch(e) { gUserEmail = ''; }

      localStorage.setItem('gdrive-session', JSON.stringify({ token: gAccessToken, expiry, email: gUserEmail }));
      updateDriveUI(true);
      openDriveFirstConnectMenu();
    }
  });

  gTokenClient.requestAccessToken({ prompt: '' });
}

function updateDriveUI(signedIn) {
  const btn = document.getElementById('gdrive-btn');
  const status = document.getElementById('gdrive-status');
  if (!btn) return;
  if (signedIn) {
    btn.textContent = '☁ Drive ✓';
    btn.classList.add('signed-in');
    if (status) status.textContent = gUserEmail;
  } else {
    btn.textContent = '☁ Connect Drive';
    btn.classList.remove('signed-in');
    if (status) status.textContent = '';
  }
}

function openDriveFirstConnectMenu() {
  openModal(`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">☁ Google Drive Connected</div>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:18px;">
      Signed in as <strong>${esc(gUserEmail)}</strong>.<br><br>
      Your data is saved to a private app folder in your Google Drive — invisible to other apps, only accessible here.
    </p>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-amber" onclick="closeModal();gdriveSave()">↑ Save current data to Drive</button>
      <button class="btn btn-ghost" onclick="closeModal();gdriveLoad(false)">↓ Load data from Drive</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);
}

function openDriveMenu() {
  openModal(`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">☁ Google Drive Sync</div>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:18px;">Signed in as <strong>${esc(gUserEmail)}</strong></p>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-amber" onclick="closeModal();gdriveSave()">↑ Save to Drive</button>
      <button class="btn btn-ghost" onclick="closeModal();gdriveLoad(false)">↓ Load from Drive</button>
      <button class="btn btn-danger" style="margin-top:6px;" onclick="closeModal();gdriveSignOut()">Sign out</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);
}

async function gdriveSave() {
  if (!gAccessToken) { alert('Not signed in to Google Drive.'); return; }
  const btn = document.getElementById('gdrive-btn');
  const orig = btn.textContent;
  btn.textContent = '⏳ Saving…'; btn.disabled = true;

  try {
    const content = JSON.stringify(DB, null, 2);
    const fileId = await gdriveGetFileId();

    if (fileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
        body: content
      });
    } else {
      const meta = { name: GDRIVE_FILENAME, parents: ['appDataFolder'] };
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
      form.append('file', new Blob([content], { type: 'application/json' }));
      const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + gAccessToken }, body: form
      });
      const data = await r.json();
      gDriveFileId = data.id;
    }

    const si = document.getElementById('save-indicator');
    si.textContent = '✓ Saved to Drive'; si.classList.add('show');
    setTimeout(() => { si.textContent = '✓ Saved'; si.classList.remove('show'); }, 3000);
  } catch(e) {
    alert('Drive save failed: ' + e.message + '\n\nData is still saved locally.');
  }
  btn.textContent = orig; btn.disabled = false;
}

async function gdriveLoad(silent) {
  if (!gAccessToken) return;
  const btn = document.getElementById('gdrive-btn');
  const orig = btn.textContent;
  if (!silent) { btn.textContent = '⏳ Loading…'; btn.disabled = true; }

  try {
    const fileId = await gdriveGetFileId();
    if (!fileId) {
      if (!silent) alert('No saved data found in Google Drive yet.\nUse "Save to Drive" first.');
      return;
    }
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { 'Authorization': 'Bearer ' + gAccessToken }
    });
    const data = await r.json();
    if (data.loads !== undefined) {
      Object.assign(DB, data);
      save(); detailView = null; render();
      if (!silent) {
        const si = document.getElementById('save-indicator');
        si.textContent = '✓ Loaded from Drive'; si.classList.add('show');
        setTimeout(() => { si.textContent = '✓ Saved'; si.classList.remove('show'); }, 3000);
      }
    } else {
      if (!silent) alert('Drive file appears invalid or empty.');
    }
  } catch(e) {
    if (!silent) alert('Drive load failed: ' + e.message);
  }
  if (!silent) { btn.textContent = orig; btn.disabled = false; }
}

async function gdriveGetFileId() {
  if (gDriveFileId) return gDriveFileId;
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27${GDRIVE_FILENAME}%27&fields=files(id)`,
    { headers: { 'Authorization': 'Bearer ' + gAccessToken } }
  );
  const data = await r.json();
  if (data.files?.length > 0) { gDriveFileId = data.files[0].id; return gDriveFileId; }
  return null;
}

function gdriveSignOut() {
  const token = gAccessToken;
  gAccessToken = null; gDriveFileId = null; gUserEmail = '';
  localStorage.removeItem('gdrive-session');
  updateDriveUI(false);
  if (window.google && token) google.accounts.oauth2.revoke(token, () => {});
}
</script>
